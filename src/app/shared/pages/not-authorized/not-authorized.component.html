<div class="auth-container" [dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
  <div class="text-center auth-card">
    <div class="flex flex-col items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-lock-reveal text-danger" viewBox="0 0 16 16">
        <path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0m-9 8c0 1 1 1 1 1h5v-1H3c0-1 1-2 2-2h1.4c.09-.2.193-.393.303-.58A4.474 4.474 0 0 0 5 9c-4 0-5 3-5 4m14.5-2c0-1.5-1.5-3-3.5-3S8.5 9.5 8.5 11s1.5 3 3.5 3 3.5-1.5 3.5-3m-1 0a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
      </svg>
    </div>

    <h1 class="mt-4 display-4 fw-bold">{{ 'NOT_AUTHORIZED.TITLE' | translate }}</h1>
    <p class="lead text-muted">
      {{ 'NOT_AUTHORIZED.DESCRIPTION' | translate }}
    </p>

    <div class="mt-5 error-actions">
      <button (click)="retryLogin()" class="px-4 btn btn-primary btn-lg me-sm-3">
        <i class="bi bi-arrow-clockwise"></i> {{ 'NOT_AUTHORIZED.RETRY_BUTTON' | translate }}
      </button>
      <button routerLink="/dashboard" class="px-4 btn btn-outline-secondary btn-lg">
        {{ 'NOT_AUTHORIZED.HOME_BUTTON' | translate }}
      </button>
    </div>

    <div class="mt-4 support-text">
      <small class="text-muted">
        {{ 'NOT_AUTHORIZED.SUPPORT_TEXT' | translate }}
      </small>
    </div>
  </div>
</div>
