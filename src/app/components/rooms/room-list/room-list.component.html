  <div class="flex items-center justify-between mb-6">

      {{ "ROOMS.TITLE" | translate }}
    </h2>

  </div>

  <div class="container px-4 mx-auto rtl">
    <div
      class="grid grid-cols-1 gap-6 md:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3"
    >
      <div
        *ngFor="let room of rooms"
        class="min-h-[400px] h-full overflow-hidden transition-all duration-300 bg-white rounded-xl shadow-lg hover:shadow-2xl border border-gray-100 flex flex-col"
      >
        <div class="flex flex-col flex-grow p-6">
          <!-- Header Section -->
          <div class="flex items-start justify-between mb-5">
            <h2 class="text-xl font-bold text-right text-gray-800">
              <!-- English when current language is English -->
              <ng-container *ngIf="currentLang === 'en'">
                {{ room.roomNameEn }}
              </ng-container>

              <!-- Arabic when current language is Arabic -->
              <ng-container *ngIf="currentLang === 'ar'">
                {{ room.roomNameAr }}
              </ng-container>
            </h2>
            <span
              class="px-4 py-1.5 text-sm font-semibold text-white rounded-full bg-gradient-to-r from-primary to-primary/80 shadow-sm min-w-[80px] text-center"
            >
              {{ room.capacity }} {{ "ROOMS.SEATS" | translate }}
            </span>
          </div>
          <hr class="mb-4 border-gray-200" />

          <!-- Content Section -->
          <div class="flex-grow mb-2 space-y-2">
            <!-- Location Info -->
            <div class="flex items-center text-gray-700">
              <svg
                class="flex-shrink-0 w-5 h-40 mt-3 ml-3 text-primary"
                fill="currentColor"
                viewBox="0 0 20 20"
              >
                <path
                  fill-rule="evenodd"
                  d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
                  clip-rule="evenodd"
                />
              </svg>
              <span
                class="leading-relaxed text-right text-gray-700 line-clamp-6"
              >
                {{ room.location }}
              </span>
            </div>

            <!-- Floor Info -->
            <div class="flex items-center mt-4 text-gray-600">
              <svg
                class="flex-shrink-0 w-5 h-5 ml-3 text-secondary"
                fill="currentColor"
                viewBox="0 0 20 20"
              >
                <path
                  fill-rule="evenodd"
                  d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 110 2h-3a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H4a1 1 0 110-2V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z"
                  clip-rule="evenodd"
                />
              </svg>
              <span class="font-medium text-right text-gray-800">
                {{ "ROOMS.FLOOR" | translate }} {{ room.floorNumber }}
              </span>
            </div>
          </div>

          <!-- Button - Always at bottom -->
          <button  (click)="bookRoom(room.roomId)"
            class="w-full px-6 py-3 mt-auto font-semibold text-white transition-all duration-300 rounded-lg shadow-md bg-gradient-to-r from-secondary to-secondary/90 hover:from-third hover:to-third/90 hover:shadow-lg"
          >
            {{ "ROOMS.BOOK_ROOM" | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
