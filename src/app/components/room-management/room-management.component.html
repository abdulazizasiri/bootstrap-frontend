<div class="max-w-6xl p-6 mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Room Management</h2>
    <button
      (click)="showForm = true"
      class="flex items-center px-4 py-2 rounded-lg bg-secondary hover:bg-third text-primary">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
      Add New Room
    </button>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="px-4 py-3 mb-4 text-red-700 bg-red-100 border border-red-400 rounded">
    {{ error }}
    <button (click)="error = ''" class="float-right font-bold text-red-800">×</button>
  </div>

  <!-- Room Form -->
  <div *ngIf="showForm" class="p-6 mb-6 bg-white border-2 border-blue-200 rounded-lg shadow-md">
    <h3 class="mb-4 text-xl font-semibold text-blue-600">
      {{ editingRoom ? 'Edit Room' : 'Add New Room' }}
    </h3>

    <!-- (ngSubmit)="saveRoom()"  -->
    <form
    class="space-y-4">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div>
          <label class="block mb-1 text-sm font-medium">Room Name *</label>
          <input
            type="text"
            [(ngModel)]="roomForm.roomNameEn"
            name="name"
            required
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent">
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium">Capacity *</label>
          <input
            type="number"
            [(ngModel)]="roomForm.capacity"
            name="capacity"
            min="1"
            required
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent">
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium">Location *</label>
          <input
            type="text"
            [(ngModel)]="roomForm.location"
            name="location"
            required
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent">
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium">Availability</label>
          <select
            [(ngModel)]="roomForm.available"
            name="available"
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent">
            <option [value]="true">Available</option>
            <option [value]="false">Unavailable</option>
          </select>
        </div>
      </div>

      <!-- Amenities Section -->
      <div>
        <label class="block mb-1 text-sm font-medium">Amenities</label>

        <!-- Quick Add Buttons -->
        <div class="mb-3">
          <p class="mb-2 text-sm text-gray-600">Quick add amenities:</p>
          <div class="flex flex-wrap gap-2">
            <!-- (click)="addAmenity(amenity)" -->
            <button
              *ngFor="let amenity of commonAmenities"
              type="button"
              class="px-3 py-1 text-sm text-gray-700 transition-colors bg-gray-200 rounded hover:bg-gray-300">
              + {{ amenity }}
            </button>
          </div>
        </div>

        <!-- Amenities Input -->
        <div>
          <label class="block mb-1 text-xs text-gray-600">
            Enter amenities separated by commas
          </label>
          <textarea
            [(ngModel)]="roomForm.amenities"
            name="amenities"
            rows="2"
            placeholder="e.g., Projector, Whiteboard, WiFi, Air Conditioning"
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent"></textarea>
        </div>

        <!-- Selected Amenities Preview *ngIf="roomForm.amenities" -->
        <div  class="mt-2">
          <p class="mb-1 text-xs text-gray-600">Current amenities:</p>
          <div class="flex flex-wrap gap-2">
            <!-- *ngFor="let amenity of getAmenitiesArray(roomForm.amenities)" -->
            <span
              class="flex items-center px-3 py-1 text-sm rounded-full bg-secondary hover:bg-third text-primary">
              <!-- (click)="removeAmenity(amenity)" -->
              <!-- {{ amenity }} -->
              <button
                type="button"
                class="ml-2 text-lg text-red-500 hover:text-red-700">
                ×
              </button>
            </span>
          </div>
        </div>
      </div>

      <div class="flex gap-2 pt-4">
        <!-- [disabled]="!roomForm.name || !roomForm.capacity || !roomForm.location" -->
        <button
          type="submit"
          class="flex items-center px-6 py-2 transition-colors bg-green-600 rounded-lg text-secondary hover:bg-green-700 disabled:bg-gray-400">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
          {{ editingRoom ? 'Update Room' : 'Create Room' }}
        </button>
        <!-- (click)="cancel Edit()" -->
        <button
          type="button"
          class="px-6 py-2 text-white transition-colors bg-gray-500 rounded-lg hover:bg-gray-600">
          Cancel
        </button>
      </div>
    </form>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="py-8 text-center">
    <div class="inline-block w-8 h-8 border-b-2 border-blue-600 rounded-full animate-spin"></div>
    <p class="mt-2 text-gray-500">Loading rooms...</p>
  </div>

  <!-- Rooms Table -->
  <div *ngIf="!loading && !error" class="overflow-hidden bg-white rounded-lg shadow">
    <table class="w-full">
      <thead class="bg-blue-100">
        <tr>
          <th class="p-3 text-left">Name</th>
          <th class="p-3 text-left">Location</th>
          <th class="p-3 text-left">Capacity</th>
          <th class="p-3 text-left">Amenities</th>
          <th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- <tr *ngFor="let room of rooms; let i = index"
            [class.bg-gray-50]="i % 2 === 0"
            class="transition-colors border-b hover:bg-blue-50">
          <td class="p-3 font-medium">{{ room.name }}</td>

              <span *ngIf="!room.amenities" class="text-xs text-gray-500">No amenities</span>

                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>

             (click)="deleteRoom(room.id)"

              </button>
            </div>
          </td>
        </tr> -->
      </tbody>
    </table>

    <div *ngIf="rooms.length === 0 && !loading && !error" class="py-12 text-center">
      <div class="mb-4 text-gray-400">
        <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
        </svg>
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-600">No rooms found</h3>
      <p class="mb-4 text-gray-500">Get started by adding your first conference room.</p>
      <button
        (click)="showForm = true"
        class="px-6 py-2 text-white rounded-lg bg-secondary hover:bg-third">
        Add Your First Room
      </button>
    </div>
  </div>
</div>
